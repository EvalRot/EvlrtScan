id: sqli-boolean-string-2
name: "SQL Injection — Boolean Based - Quoted Parameter #2"
category: injection
severity: high
injection_strategy: APPEND

payload_group:
  - id: p1
    value: "' AND '1'='1' -- "
  - id: p2
    value: "' AND '1'='2' -- "

detection:
  baseline: true
  rules:
    - type: smart_diff
      content_threshold: 0.90
      structure_threshold: 0.95
      expression: "(baseline ~ p1) AND (baseline !~ p2) AND (p1 !~ p2)"
